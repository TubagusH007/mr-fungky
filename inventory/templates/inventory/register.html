<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Bee Intelligence</title>
    <meta name="color-scheme" content="light">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Setup Dark Mode
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', // blue-600
                        primary_hover: '#1d4ed8', // blue-700
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card { border-radius: 1.5rem; transition: transform 0.2s, box-shadow 0.2s; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 flex items-center justify-center min-h-screen p-6 transition-colors duration-200">

    <div class="w-full max-w-md">
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white font-bold">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Bee Intelligence</h1>
        </div>

        <div class="card p-8 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 shadow-xl">
            <h2 class="text-xl font-bold text-center mb-2">Daftar Petugas Baru</h2>
            <p class="text-zinc-500 dark:text-zinc-400 text-sm mb-8 text-center">Buat akun untuk mulai mengelola stok gudang.</p>

            {% if error %}
                <div class="mb-6 p-4 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-sm rounded-xl font-medium border border-red-100 dark:border-red-900/50">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase mb-2 ml-1">Username</label>
                    <input type="text" name="username" class="w-full px-4 py-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Pilih nama pengguna..." required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase mb-2 ml-1">Password</label>
                    <input type="password" name="password" class="w-full px-4 py-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Min. 8 karakter" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase mb-2 ml-1">Konfirmasi Password</label>
                    <input type="password" name="confirm_password" class="w-full px-4 py-3 bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Ulangi password" required>
                </div>
                <button type="submit" class="w-full py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary_hover transition-all mt-6 shadow-lg shadow-primary/30">
                    Daftar Akun
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-zinc-500 dark:text-zinc-400">
                    Sudah punya akun? 
                    <a href="{% url 'halaman_login' %}" class="font-bold text-primary hover:underline">Login di sini</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
